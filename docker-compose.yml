services:
  db:
    image: postgres:16-alpine
    container_name: cybrella-time-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cybrella
      POSTGRES_PASSWORD: cybrella_dev
      POSTGRES_DB: cybrella_time
    ports:
      - "5432:5432"
    volumes:
      - cybrella_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybrella -d cybrella_time"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cybrella-time-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://cybrella:cybrella_dev@db:5432/cybrella_time
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: cybrella-time-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  cybrella_pgdata:
